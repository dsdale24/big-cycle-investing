# Data series registry
# Each entry defines a time series to fetch, its source, and what it measures.
# Categories are descriptive, not prescriptive — they help organize, not limit analysis.

fred:
  # --- Debt & Credit Dynamics ---
  GFDEGDQ188S:
    name: Federal Debt to GDP
    category: debt
    frequency: quarterly
    description: US federal government debt as percentage of GDP

  HDTGPDUSQ163N:
    name: Household Debt to GDP
    category: debt
    frequency: quarterly
    description: Household debt to GDP ratio

  BCNSDODNS:
    name: Nonfinancial Corporate Debt
    category: debt
    frequency: quarterly
    description: Nonfinancial corporate business debt outstanding

  BUSLOANS:
    name: Commercial & Industrial Loans
    category: credit
    frequency: monthly
    description: Commercial and industrial loans at all commercial banks

  DRCCLACBS:
    name: Consumer Loan Delinquency Rate
    category: credit
    frequency: quarterly
    description: Delinquency rate on consumer loans

  # --- Interest Rates & Yield Curve ---
  FEDFUNDS:
    name: Federal Funds Rate
    category: rates
    frequency: monthly
    description: Effective federal funds rate

  GS10:
    name: 10-Year Treasury Yield
    category: rates
    frequency: monthly
    description: Market yield on 10-year Treasury constant maturity

  GS2:
    name: 2-Year Treasury Yield
    category: rates
    frequency: monthly
    description: Market yield on 2-year Treasury constant maturity

  T10Y2Y:
    name: Yield Curve (10Y-2Y)
    category: rates
    frequency: daily
    description: 10-Year minus 2-Year Treasury spread

  T10YIE:
    name: 10-Year Breakeven Inflation
    category: rates
    frequency: daily
    description: 10-year breakeven inflation rate (TIPS spread)
    start_override: "2003-01-01"  # TIPS didn't exist before ~2003 in FRED

  BAA10Y:
    name: BAA Corporate Bond Spread
    category: rates
    frequency: daily
    description: Moody's BAA corporate bond yield minus 10Y Treasury

  # --- Inflation & Monetary ---
  CPIAUCSL:
    name: CPI (All Urban Consumers)
    category: inflation
    frequency: monthly
    description: Consumer Price Index for all urban consumers, seasonally adjusted

  PCEPI:
    name: PCE Price Index
    category: inflation
    frequency: monthly
    description: Personal Consumption Expenditures price index

  M2SL:
    name: M2 Money Supply
    category: monetary
    frequency: monthly
    description: M2 money stock, seasonally adjusted

  BOGMBASE:
    name: Monetary Base
    category: monetary
    frequency: monthly
    description: St. Louis adjusted monetary base (proxy for central bank balance sheet)

  WALCL:
    name: Fed Total Assets
    category: monetary
    frequency: weekly
    description: Total assets held by Federal Reserve
    start_override: "2002-12-01"

  # --- Currency & Store of Value ---
  DTWEXBGS:
    name: Trade-Weighted USD (Broad)
    category: currency
    frequency: daily
    description: Nominal broad US dollar index
    start_override: "2006-01-01"

  TWEXMMTH:
    name: Trade-Weighted USD (Major Currencies)
    category: currency
    frequency: monthly
    description: Trade-weighted exchange index, major currencies
    # Goes back further than DTWEXBGS

  # --- Economy & Labor ---
  GDPC1:
    name: Real GDP
    category: economy
    frequency: quarterly
    description: Real gross domestic product, seasonally adjusted

  UNRATE:
    name: Unemployment Rate
    category: labor
    frequency: monthly
    description: Civilian unemployment rate

  ICSA:
    name: Initial Jobless Claims
    category: labor
    frequency: weekly
    description: Initial claims for unemployment insurance

  INDPRO:
    name: Industrial Production
    category: economy
    frequency: monthly
    description: Industrial production index

  UMCSENT:
    name: Consumer Sentiment
    category: economy
    frequency: monthly
    description: University of Michigan consumer sentiment index

  # --- Inequality & Internal Order ---
  # Note: high-frequency inequality data is limited; these are proxies
  MEHOINUSA672N:
    name: Median Household Income
    category: inequality
    frequency: annual
    description: Real median household income

  # --- International / External Order ---
  BOPGSTB:
    name: Trade Balance
    category: external
    frequency: monthly
    description: US goods and services trade balance

  IRLTLT01CNM156N:
    name: China Long-Term Interest Rate
    category: external
    frequency: monthly
    description: Chinese long-term government bond yield

yahoo:
  # --- Asset Prices for Portfolio Construction ---
  "^GSPC":
    name: S&P 500
    category: equity
    description: S&P 500 index

  "^IXIC":
    name: NASDAQ Composite
    category: equity
    description: NASDAQ composite index

  "^RUT":
    name: Russell 2000
    category: equity
    description: Small-cap equity index

  "GC=F":
    name: Gold Futures
    category: commodity
    description: Gold futures front month

  "CL=F":
    name: Crude Oil Futures
    category: commodity
    description: WTI crude oil futures

  "^TNX":
    name: 10Y Treasury Yield (Market)
    category: rates
    description: CBOE 10-year Treasury yield index

  "TLT":
    name: 20+ Year Treasury ETF
    category: bonds
    description: iShares 20+ Year Treasury Bond ETF
    start_override: "2002-07-01"

  "TIP":
    name: TIPS ETF
    category: bonds
    description: iShares TIPS Bond ETF
    start_override: "2003-12-01"

  "DX-Y.NYB":
    name: US Dollar Index
    category: currency
    description: ICE US Dollar Index
