# Data series registry
# Each entry defines a time series to fetch, its source, and what it measures.
# Categories are descriptive, not prescriptive — they help organize, not limit analysis.

fred:
  # --- Debt & Credit Dynamics ---
  GFDEGDQ188S:
    name: Federal Debt to GDP
    category: debt
    frequency: quarterly
    description: US federal government debt as percentage of GDP

  HDTGPDUSQ163N:
    name: Household Debt to GDP
    category: debt
    frequency: quarterly
    description: Household debt to GDP ratio

  BCNSDODNS:
    name: Nonfinancial Corporate Debt
    category: debt
    frequency: quarterly
    description: Nonfinancial corporate business debt outstanding

  BUSLOANS:
    name: Commercial & Industrial Loans
    category: credit
    frequency: monthly
    description: Commercial and industrial loans at all commercial banks

  DRCCLACBS:
    name: Consumer Loan Delinquency Rate
    category: credit
    frequency: quarterly
    description: Delinquency rate on consumer loans

  # --- Interest Rates & Yield Curve ---
  FEDFUNDS:
    name: Federal Funds Rate
    category: rates
    frequency: monthly
    description: Effective federal funds rate

  DGS10:
    name: 10-Year Treasury Yield
    category: rates
    frequency: daily
    description: Market yield on 10-year Treasury constant maturity (daily)

  GS2:
    name: 2-Year Treasury Yield
    category: rates
    frequency: monthly
    description: Market yield on 2-year Treasury constant maturity

  T10Y2Y:
    name: Yield Curve (10Y-2Y)
    category: rates
    frequency: daily
    description: 10-Year minus 2-Year Treasury spread

  T10YIE:
    name: 10-Year Breakeven Inflation
    category: rates
    frequency: daily
    description: 10-year breakeven inflation rate (TIPS spread)
    start_override: "2003-01-01"  # TIPS didn't exist before ~2003 in FRED

  BAA10Y:
    name: BAA Corporate Bond Spread
    category: rates
    frequency: daily
    description: Moody's BAA corporate bond yield minus 10Y Treasury

  # --- Inflation & Monetary ---
  CPIAUCSL:
    name: CPI (All Urban Consumers)
    category: inflation
    frequency: monthly
    description: Consumer Price Index for all urban consumers, seasonally adjusted

  PCEPI:
    name: PCE Price Index
    category: inflation
    frequency: monthly
    description: Personal Consumption Expenditures price index

  M2SL:
    name: M2 Money Supply
    category: monetary
    frequency: monthly
    description: M2 money stock, seasonally adjusted

  BOGMBASE:
    name: Monetary Base
    category: monetary
    frequency: monthly
    description: St. Louis adjusted monetary base (proxy for central bank balance sheet)

  WALCL:
    name: Fed Total Assets
    category: monetary
    frequency: weekly
    description: Total assets held by Federal Reserve
    start_override: "2002-12-01"

  # --- Currency & Store of Value ---
  DTWEXBGS:
    name: Trade-Weighted USD (Broad)
    category: currency
    frequency: daily
    description: Nominal broad US dollar index
    start_override: "2006-01-01"

  TWEXMMTH:
    name: Trade-Weighted USD (Major Currencies)
    category: currency
    frequency: monthly
    description: Trade-weighted exchange index, major currencies
    # Goes back further than DTWEXBGS

  # --- Economy & Labor ---
  GDPC1:
    name: Real GDP
    category: economy
    frequency: quarterly
    description: Real gross domestic product, seasonally adjusted

  UNRATE:
    name: Unemployment Rate
    category: labor
    frequency: monthly
    description: Civilian unemployment rate

  ICSA:
    name: Initial Jobless Claims
    category: labor
    frequency: weekly
    description: Initial claims for unemployment insurance

  INDPRO:
    name: Industrial Production
    category: economy
    frequency: monthly
    description: Industrial production index

  UMCSENT:
    name: Consumer Sentiment
    category: economy
    frequency: monthly
    description: University of Michigan consumer sentiment index

  # --- Inequality & Internal Order ---
  GINIALLRF:
    name: Gini Index (Family Income)
    category: inequality
    frequency: annual
    description: Gini ratio of family income, all races (longest available, 1947–)

  WFRBST01134:
    name: Top 1% Wealth Share
    category: inequality
    frequency: quarterly
    description: Share of total net worth held by the top 1%
    start_override: "1989-01-01"

  WFRBSB50215:
    name: Bottom 50% Wealth Share
    category: inequality
    frequency: quarterly
    description: Share of total net worth held by the bottom 50%
    start_override: "1989-01-01"

  MEHOINUSA672N:
    name: Median Household Income
    category: inequality
    frequency: annual
    description: Real median household income

  MEPAINUSA672N:
    name: Median Personal Income
    category: inequality
    frequency: annual
    description: Real median personal income

  LES1252881600Q:
    name: Median Weekly Real Earnings
    category: inequality
    frequency: quarterly
    description: Median usual weekly real earnings, full-time workers

  OPHNFB:
    name: Labor Productivity
    category: inequality
    frequency: quarterly
    description: Nonfarm business labor productivity (output per hour)

  COMPRNFB:
    name: Real Hourly Compensation
    category: inequality
    frequency: quarterly
    description: Nonfarm business real compensation per hour (compare to productivity)

  # --- Trust & Governance ---
  USEPUINDXM:
    name: Economic Policy Uncertainty
    category: governance
    frequency: monthly
    description: Baker-Bloom-Davis policy uncertainty index (newspaper-based)
    start_override: "1985-01-01"

  # --- Fiscal Sustainability ---
  FYFSGDA188S:
    name: Federal Surplus/Deficit (% GDP)
    category: fiscal
    frequency: annual
    description: Federal government surplus or deficit as percent of GDP (1929–)

  FYOIGDA188S:
    name: Federal Interest Payments (% GDP)
    category: fiscal
    frequency: annual
    description: Federal government interest payments as percent of GDP — debt spiral warning

  FDHBFIN:
    name: Federal Debt Held by Foreign Investors
    category: fiscal
    frequency: quarterly
    description: Foreign holdings of US federal debt — external financing dependency

  FDHBFRBN:
    name: Federal Debt Held by Federal Reserve
    category: fiscal
    frequency: quarterly
    description: Fed holdings of federal debt — debt monetization proxy

  FDEFX:
    name: Defense Spending
    category: external
    frequency: quarterly
    description: Federal defense spending (military power proxy)

  # --- International / External Order ---
  BOPGSTB:
    name: Trade Balance
    category: external
    frequency: monthly
    description: US goods and services trade balance

  NETFI:
    name: Current Account Balance (NIPA)
    category: external
    frequency: quarterly
    description: Balance on current account — net capital flows (1947–)

  IIPUSNETIA:
    name: Net International Investment Position
    category: external
    frequency: annual
    description: US net creditor/debtor position — shifted from largest creditor to largest debtor

  TWEXBGSMTH:
    name: Trade-Weighted USD (Broad, Monthly)
    category: external
    frequency: monthly
    description: Broad trade-weighted dollar index, monthly (1973–)

  TRESEGUSM052N:
    name: Total Reserves excl Gold
    category: external
    frequency: monthly
    description: US reserve holdings excluding gold (1950–)

  # --- Human Capital & Civilizational Health ---
  A939RX0Q048SBEA:
    name: Real GDP per Capita
    category: human_capital
    frequency: quarterly
    description: Real gross domestic product per capita

  Y694RC1Q027SBEA:
    name: R&D Spending
    category: human_capital
    frequency: quarterly
    description: GDP component — research and development

  SPDYNLE00INUSA:
    name: Life Expectancy at Birth
    category: human_capital
    frequency: annual
    description: US life expectancy — civilizational health metric (stalled/declined 2015–2020)

  SPDYNIMRTINUSA:
    name: Infant Mortality Rate
    category: human_capital
    frequency: annual
    description: Infant mortality per 1000 live births — development quality proxy

yahoo:
  # --- Asset Prices for Portfolio Construction ---
  "^GSPC":
    name: S&P 500
    category: equity
    description: S&P 500 index

  "^IXIC":
    name: NASDAQ Composite
    category: equity
    description: NASDAQ composite index

  "^RUT":
    name: Russell 2000
    category: equity
    description: Small-cap equity index

  "GC=F":
    name: Gold Futures
    category: commodity
    description: Gold futures front month

  "CL=F":
    name: Crude Oil Futures
    category: commodity
    description: WTI crude oil futures

  "^TNX":
    name: 10Y Treasury Yield (Market)
    category: rates
    description: CBOE 10-year Treasury yield index

  "TLT":
    name: 20+ Year Treasury ETF
    category: bonds
    description: iShares 20+ Year Treasury Bond ETF
    start_override: "2002-07-01"

  "TIP":
    name: TIPS ETF
    category: bonds
    description: iShares TIPS Bond ETF
    start_override: "2003-12-01"

  "DX-Y.NYB":
    name: US Dollar Index
    category: currency
    description: ICE US Dollar Index
